<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pronostics</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="drivers.js"></script>

</head>

<body>

<header>

<h1>🏁 Pronostics</h1>

<nav>
<a href="index.html">Accueil</a>
<a href="pronos.html">Pronostics</a>
<a href="classement.html">Classement</a>
</nav>

</header>


<section class="card">

<label>Nom du joueur</label>
<input id="player" placeholder="Ton nom">

<h2>Qualifications</h2>
<div id="qualif"></div>

<h2>Course</h2>
<div id="course"></div>

<h2>Bonus</h2>

<label>Meilleur tour</label>
<select id="fastest"></select>

<label>Premier virage</label>
<select id="firstcorner"></select>

<label>Abandon</label>
<select id="dnf"></select>

<br><br>

<button onclick="save()">Valider mon pronostic</button>

</section>


<script>

const drivers = window.drivers


function createSelect(id){

let select = document.createElement("select")
select.id = id

drivers.forEach(driver => {

let option = document.createElement("option")

option.value = driver
option.text = driver

select.appendChild(option)

})

return select

}


function build(area,prefix){

let div = document.getElementById(area)

for(let i=1;i<=5;i++){

let label = document.createElement("label")
label.innerText = prefix+" "+i

div.appendChild(label)
div.appendChild(createSelect(prefix+i))

}

}


build("qualif","Q")
build("course","C")


document.getElementById("fastest").replaceWith(createSelect("fastest"))
document.getElementById("firstcorner").replaceWith(createSelect("firstcorner"))
document.getElementById("dnf").replaceWith(createSelect("dnf"))



async function save(){

let player = document.getElementById("player").value

if(!player){

alert("Entre ton nom")

return

}

const { error } = await supabaseClient
.from("predictions")
.insert([
{
player_name: player,
race: "GP"
}
])

if(error){

alert("Erreur enregistrement")

}else{

alert("Pronostic enregistré")

}

}

</script>


</body>

</html>
