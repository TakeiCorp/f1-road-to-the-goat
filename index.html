
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F1 Road to the GOAT</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🏁 F1 Road to the GOAT</h1>

<div class="card">
<label>Nom du joueur</label>
<input id="player" placeholder="Nom">
</div>

<div class="card">
<h2>Qualifications</h2>
<p class="lock">Verrouillage : vendredi 23h59</p>
<div id="qualif"></div>
</div>

<div class="card">
<h2>Course</h2>
<p class="lock">Verrouillage : samedi 23h59</p>
<div id="race"></div>

<h3>Bonus</h3>
<select id="fastest"></select>
<select id="firstcorner"></select>
<select id="dnf"></select>
</div>

<button onclick="save()">Valider pronostic</button>

<h2>Pronostics</h2>
<table>
<thead>
<tr><th>Joueur</th><th>Qualif</th><th>Course</th><th>Bonus</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const drivers = ["Lando Norris", "Oscar Piastri", "Max Verstappen", "Lewis Hamilton", "Charles Leclerc", "George Russell", "Kimi Antonelli", "Fernando Alonso", "Lance Stroll", "Pierre Gasly", "Franco Colapinto", "Alexander Albon", "Carlos Sainz", "Esteban Ocon", "Oliver Bearman", "Liam Lawson", "Arvid Lindblad", "Nico H\u00fclkenberg", "Gabriel Bortoleto", "Sergio Perez", "Valtteri Bottas"];

function createSelect(id) {
 let s=document.createElement("select");
 s.id=id;
 drivers.forEach(d=>{
  let o=document.createElement("option");
  o.text=d;
  s.add(o);
 });
 return s;
}

function fill(area,prefix) {
 let div=document.getElementById(area);
 for(let i=1;i<=5;i++) {
  let label=document.createElement("label");
  label.innerText=prefix+" "+i;
  let sel=createSelect(prefix+i);
  div.appendChild(label);
  div.appendChild(sel);
 }
}

fill("qualif","Q");
fill("race","R");

document.getElementById("fastest").replaceWith(createSelect("fastest"));
document.getElementById("firstcorner").replaceWith(createSelect("firstcorner"));
document.getElementById("dnf").replaceWith(createSelect("dnf"));

function isQualifLocked() {
 let now=new Date();
 let day=now.getDay();
 let hour=now.getHours();
 let min=now.getMinutes();

 if(day>5) return true;
 if(day==5 && (hour>23 || (hour==23 && min>59))) return true;
 return false;
}

function isRaceLocked() {
 let now=new Date();
 let day=now.getDay();
 let hour=now.getHours();
 let min=now.getMinutes();

 if(day>6) return true;
 if(day==6 && (hour>23 || (hour==23 && min>59))) return true;
 return false;
}

function save(){
 let player=document.getElementById("player").value;
 if(!player) return alert("Entre ton nom");

 let q=[], r=[];

 if(!isQualifLocked()) {
  for(let i=1;i<=5;i++) q.push(document.getElementById("Q"+i).value);
 }

 if(!isRaceLocked()) {
  for(let i=1;i<=5;i++) r.push(document.getElementById("R"+i).value);
 }

 let bonus=[
 document.getElementById("fastest").value,
 document.getElementById("firstcorner").value,
 document.getElementById("dnf").value
 ];

 let data=JSON.parse(localStorage.getItem("goatF1")||"[]");
 data.push({player,q,r,bonus,time:new Date().toLocaleString()});
 localStorage.setItem("goatF1",JSON.stringify(data));

 render();
}

function render(){
 let body=document.getElementById("table");
 body.innerHTML="";
 let data=JSON.parse(localStorage.getItem("goatF1")||"[]");

 data.forEach(d=>{
 let tr=document.createElement("tr");
 tr.innerHTML=`
 <td>${d.player}</td>
 <td>${d.q.join(", ")}</td>
 <td>${d.r.join(", ")}</td>
 <td>${d.bonus.join(", ")}</td>`;
 body.appendChild(tr);
 });
}

render();

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
